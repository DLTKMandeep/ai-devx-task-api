name: CI Pipeline

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx fastapi pydantic bandit isort

      - name: 🪄 Auto-fix Lint & Format (Ruff)
        run: |
          ruff check . --fix
          ruff format .

      - name: ⚡ Verify Quality Gate (Ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: 🔒 Security Scan (Bandit)
        run: bandit -r src/

      - name: 🧪 Run Tests (Pytest)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/ -v
