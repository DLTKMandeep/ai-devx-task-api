name: Elite DevX Pipeline

permissions:
  contents: write
  pull-requests: write
  id-token: write # Required for modern AWS OIDC if you switch from keys

on:
  push:
    branches:
      - "**"

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: '3.12'

jobs:
################################################
# 1. CI, AUTO-FIX, PR & FORCE MERGE
################################################
  ci-and-auto-merge:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install CI Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx fastapi pydantic bandit

      - name: 🔧 Auto-Fix & Test
        run: |
          ruff format .
          ruff check . --fix
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/ -v

      - name: 🚀 Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ${{ github.ref_name }}-auto-pr
          title: "🚀 Auto-Merge: ${{ github.ref_name }}"
          commit-message: "chore: automated devx fixes and formatting"
          delete-branch: true

      - name: ✅ Auto-Approve & Force Merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ steps.cpr.outputs.pull-request-number }} --approve
          sleep 5
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --merge --admin --delete-branch

################################################
# 2. QA DEPLOYMENT (Triggered by merge to main)
################################################
  deploy-qa:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: QA
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy to QA (Pulumi)
        run: |
          curl -fsSL https://get.pulumi.com | sh
          export PATH=$PATH:$HOME/.pulumi/bin
          cd infra/aws
          pip install pulumi pulumi-aws
          pulumi login
          pulumi stack select DLTKMandeep/qa || pulumi stack init DLTKMandeep/qa
          pulumi up --yes --non-interactive
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

################################################
# 3. QA POST-DEPLOYMENT TESTS
################################################
  qa-tests:
    needs: deploy-qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E Integration Tests
        run: |
          pip install pytest httpx
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/ -v

################################################
# 4. PRODUCTION DEPLOYMENT (Gated by QA Tests)
################################################
  deploy-prod:
    needs: qa-tests
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to PROD (Pulumi)
        run: |
          curl -fsSL https://get.pulumi.com | sh
          export PATH=$PATH:$HOME/.pulumi/bin
          cd infra/aws
          pip install pulumi pulumi-aws
          pulumi login
          pulumi stack select DLTKMandeep/prod || pulumi stack init DLTKMandeep/prod
          pulumi up --yes --non-interactive
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
