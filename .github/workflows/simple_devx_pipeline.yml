name: Elite DevX Pipeline

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - "**"

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: '3.12'

jobs:
################################################
# 1. CI, AUTO-FIX, PR & AUTHENTICATED MERGE
################################################
  ci-and-auto-merge:
    # Stop the job if we are already on main to avoid loops
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest bandit fastapi pydantic httpx
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔧 Auto-Fix & Unit Test
        run: |
          ruff format .
          ruff check . --fix
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src:$(pwd)
          pytest tests/ -v

      - name: 🚀 Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MY_GH_PAT }}
          base: main
          branch: ${{ github.ref_name }}-auto-pr
          title: "🚀 Auto-Merge: ${{ github.ref_name }}"
          commit-message: "chore: automated devx fixes"
          delete-branch: true

      - name: ⚡ Force Merge (Admin Bypass)
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.MY_GH_PAT }}
        run: |
          # Wait for GitHub to register the PR
          sleep 10
          # Using --squash for a clean history and --admin to bypass any rules
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --admin --delete-branch

################################################
# 2. QA DEPLOYMENT (Only after merge to main)
################################################
  deploy-qa:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: QA
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy to QA
        run: |
          curl -fsSL https://get.pulumi.com | sh
          export PATH=$PATH:$HOME/.pulumi/bin
          cd infra/aws
          pip install pulumi pulumi-aws
          pulumi login
          pulumi stack select DLTKMandeep/qa || pulumi stack init DLTKMandeep/qa
          pulumi up --yes --non-interactive
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

################################################
# 3. QA TESTS & PRODUCTION
################################################
  qa-tests:
    needs: deploy-qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          pip install pytest httpx fastapi pydantic
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src:$(pwd)
          pytest tests/ -v

  deploy-prod:
    needs: qa-tests
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy to PROD
        run: |
          export PATH=$PATH:$HOME/.pulumi/bin
          cd infra/aws
          pip install pulumi pulumi-aws
          pulumi login
          pulumi stack select DLTKMandeep/prod || pulumi stack init DLTKMandeep/prod
          pulumi up --yes --non-interactive
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
