name: Brute Force Velocity Pipeline

permissions:
  contents: write
  id-token: write

on:
  push:
    branches:
      - "**"
      - "!main" # Prevents the workflow from triggering itself in a loop

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: '3.12'

jobs:
################################################
# 1. FIX, TEST, AND FORCE-SYNC TO MAIN
################################################
  ci-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Using GITHUB_TOKEN is fine here because we are doing a direct push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest bandit fastapi pydantic httpx
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔧 Auto-Fix & Unit Test
        run: |
          ruff format .
          ruff check . --fix
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src:$(pwd)
          pytest tests/ -v

      - name: 🚀 Force Sync to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add any ruff fixes
          git add .
          git commit -m "chore: automated devx fixes [skip ci]" || echo "No changes to commit"
          
          # Force push the current branch state directly into the main branch
          git push origin ${{ github.ref_name }}:main --force

################################################
# 2. QA DEPLOYMENT (Triggered by the push to main)
################################################
  deploy-qa:
    # This runs only when the sync above (or a direct push) hits main
    if: github.ref == 'refs/heads/main' || success() 
    needs: ci-and-sync
    runs-on: ubuntu-latest
    environment: QA
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy to QA (Pulumi)
        run: |
          curl -fsSL https://get.pulumi.com | sh
          export PATH=$PATH:$HOME/.pulumi/bin
          cd infra/aws
          pip install pulumi pulumi-aws
          pulumi login
          pulumi stack select DLTKMandeep/qa || pulumi stack init DLTKMandeep/qa
          pulumi up --yes --non-interactive
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

################################################
# 3. QA TESTS & PRODUCTION
################################################
  qa-tests:
    needs: deploy-qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          pip install pytest httpx fastapi pydantic
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src:$(pwd)
          pytest tests/ -v

  deploy-prod:
    needs: qa-tests
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy to PROD
        run: |
          export PATH=$PATH:$HOME/.pulumi/bin
          cd infra/aws
          pip install pulumi pulumi-aws
          pulumi login
          pulumi stack select DLTKMandeep/prod || pulumi stack init DLTKMandeep/prod
          pulumi up --yes --non-interactive
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
