name: Simple DevX Pipeline v 2.0

permissions:
  contents: write
  pull-requests: write
  repository-projects: read

on:
  push:
    branches:
      - "**"

env:
  AWS_REGION: us-east-1

jobs:
################################################
# 1. CI & AUTO-FIX (Runs on Feature Branches)
################################################
  ci-and-pr:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.cpr.outputs.pull-request-number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx fastapi pydantic bandit

      - name: 🔧 Fix & Format Code (Ruff)
        run: |
          ruff format .
          ruff check . --fix

      - name: 🧪 Run Tests & Security
        run: |
          bandit -r src/ || true # Don't block format for minor security warnings
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/ -v

      - name: 🚀 Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ${{ github.ref_name }}-auto-pr
          title: "Auto PR: ${{ github.ref_name }} → main"
          commit-message: "chore: automated linting fixes"
          body: "Automated PR created by DevX Pipeline."
          delete-branch: true

      - name: ⚡ Auto-Merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 5
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --merge --auto --delete-branch

################################################
# 2. QA DEPLOY (Runs when code hits main)
################################################
  deploy-qa:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: QA
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pulumi
        run: curl -fsSL https://get.pulumi.com | sh

      - name: Deploy QA
        run: |
          export PATH=$PATH:$HOME/.pulumi/bin
          cd infra/aws
          pip install pulumi pulumi-aws
          pulumi login
          pulumi stack select DLTKMandeep/qa || pulumi stack init DLTKMandeep/qa
          pulumi up --yes --non-interactive
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

################################################
# 3. QA TESTS & PROD DEPLOY
################################################
  qa-tests:
    needs: deploy-qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E Tests
        run: |
          pip install pytest
          pytest tests/ -v

  deploy-prod:
    needs: qa-tests
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy PROD
        run: |
          export PATH=$PATH:$HOME/.pulumi/bin
          cd infra/aws
          pip install pulumi pulumi-aws
          pulumi login
          pulumi stack select DLTKMandeep/prod || pulumi stack init DLTKMandeep/prod
          pulumi up --yes --non-interactive
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
